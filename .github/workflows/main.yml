# totally not vibe-coded :)

name: Release mattOS

on:
  push:
    branches: ["**"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Parse commit message
        id: parse_commit
        run: |
          msg="$(git log -1 --pretty=format:'%s')"
          echo "Commit message: $msg"

          if [[ "$msg" =~ ^release:\ version\ (.+)$ ]]; then
            version="${BASH_REMATCH[1]}"
            echo "VERSION=$version" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release branch
        if: ${{ steps.parse_commit.outputs.VERSION != '' }}
        env:
          VERSION: ${{ steps.parse_commit.outputs.VERSION }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          branch="version-$VERSION"
          echo "Creating branch '$branch'"
          git branch "$branch"
          git push origin "$branch"

      - name: Cache i386-elf toolchain
        if: ${{ steps.parse_commit.outputs.VERSION != '' }}
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: /opt/i386-elf
          key: i386-elf-toolchain-binutils-2.43-gcc-14.2.0-${{ runner.os }}
          restore-keys: |
            i386-elf-toolchain-binutils-2.43-gcc-14.2.0-${{ runner.os }}

      - name: Install dependencies
        if: ${{ steps.parse_commit.outputs.VERSION != '' }}
        run: |
          sudo apt update
          sudo apt install -y build-essential bison flex libgmp3-dev libmpc-dev libmpfr-dev texinfo libisl-dev wget xz-utils

      - name: Build and install i386-elf toolchain
        if: ${{ steps.parse_commit.outputs.VERSION != '' && steps.cache-toolchain.outputs.cache-hit != 'true' }}
        run: |
          export TARGET=i386-elf
          export PREFIX="/opt/i386-elf"
          export PATH="$PREFIX/bin:$PATH"

          mkdir -p ~/toolchain-build && cd ~/toolchain-build

          # Binutils
          wget https://ftp.gnu.org/gnu/binutils/binutils-2.43.tar.xz
          tar xf binutils-2.43.tar.xz
          mkdir build-binutils && cd build-binutils
          ../binutils-2.43/configure --target=$TARGET --prefix="$PREFIX" --disable-nls --disable-werror
          make -j$(nproc)
          make install
          cd ..

          wget https://ftp.gnu.org/gnu/gcc/gcc-14.2.0/gcc-14.2.0.tar.xz
          tar xf gcc-14.2.0.tar.xz
          mkdir build-gcc && cd build-gcc
          ../gcc-14.2.0/configure --target=$TARGET --prefix="$PREFIX" --disable-nls --enable-languages=c --without-headers
          make -j$(nproc) all-gcc
          make -j$(nproc) all-target-libgcc
          make install-gcc
          make install-target-libgcc

          echo "Toolchain built and installed to $PREFIX"

      - name: Add toolchain to PATH
        if: ${{ steps.parse_commit.outputs.VERSION != '' }}
        run: echo "/opt/i386-elf/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        if: ${{ steps.parse_commit.outputs.VERSION != '' }}
        run: i386-elf-gcc --version

      - name: Build kernel
        if: ${{ steps.parse_commit.outputs.VERSION != '' }}
        run: make CC=i386-elf-gcc CXX=i386-elf-g++ AS=i386-elf-as LD=i386-elf-ld OBJCOPY=i386-elf-objcopy

      - name: Create GitHub Release
        if: ${{ steps.parse_commit.outputs.VERSION != '' }}
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: "version-${{ steps.parse_commit.outputs.VERSION }}"
          release_name: "mattOS ${{ steps.parse_commit.outputs.VERSION }}"
          draft: false
          prerelease: false

      - name: Upload myos.bin to release
        if: ${{ steps.parse_commit.outputs.VERSION != '' }}
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./myos.bin
          asset_name: myos.bin
          asset_content_type: application/octet-stream
